<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .container { max-width: 900px; }
        body { background-color: #f8f9fa; }
    </style>
</head>

<div th:fragment="alerts" class="container mt-2">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">성공 메시지</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}">오류 메시지</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Spring Board</a>
        <div class="navbar-nav ms-auto">
            <th:block th:if="${session.loginMember == null}">
                <a class="nav-link" href="/login">로그인</a>
                <a class="nav-link" href="/members/new">회원가입</a>
            </th:block>
            <th:block th:if="${session.loginMember != null}">
                <span class="navbar-text me-3 text-white">
                    <b th:text="${session.loginMember.name}">이름</b>님 접속중
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                    <button type="submit" class="btn btn-outline-danger btn-sm">로그아웃</button>
                </form>
            </th:block>
        </div>
    </div>
</nav>
</html>
