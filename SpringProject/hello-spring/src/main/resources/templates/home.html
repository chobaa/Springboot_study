<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Spring Board Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 0;
            border-radius: 15px;
            margin-top: 30px;
        }
        .card-custom {
            transition: transform 0.3s;
            cursor: pointer;
        }
        .card-custom:hover {
            transform: translateY(-10px);
        }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <div class="hero-section text-center shadow">
        <h1 class="display-4 fw-bold">스프링 게시판 프로젝트</h1>
        <p class="lead">김영한 님의 강의를 기반으로 만든 사용자 관리 & CRUD 게시판입니다.</p>
        <hr class="my-4" style="background-color: white; height: 2px; width: 50%; margin: auto;">
        <div class="mt-4">
            <a href="/login" class="btn btn-light btn-lg px-4 me-sm-3 fw-bold">로그인</a>
            <a href="/members/new" class="btn btn-outline-light btn-lg px-4">회원가입</a>
        </div>
    </div>

    <div class="row mt-5 text-center">
        <div class="row mt-5">
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0 text-center">
                    <div class="card-body py-5 d-flex flex-column">
                        <h3 class="card-title">👥 회원 관리</h3>
                        <p class="card-text text-muted flex-grow-1">등록된 전체 회원 목록을<br>확인할 수 있습니다.</p>
                        <a href="/members" class="btn btn-outline-primary mt-auto">회원 목록 보기</a>
                    </div>
                </div>
            </div>
        
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0 text-center">
                    <div class="card-body py-5 d-flex flex-column">
                        <h3 class="card-title">📝 자유 게시판</h3>
                        <p class="card-text text-muted flex-grow-1">누구나 자유롭게 글을 쓰고<br>공유하는 공간입니다.</p>
                        <a href="/posts" class="btn btn-outline-success mt-auto">게시판 바로가기</a>
                    </div>
                </div>
            </div>
        
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0 text-center">
                    <div class="card-body py-5 d-flex flex-column">
                        <h3 class="card-title">✍️ 빠른 작성</h3>
                        <p class="card-text text-muted flex-grow-1">로그인 후 지금 바로<br>새로운 글을 작성해 보세요.</p>
                        <a href="/posts/new" class="btn btn-outline-dark mt-auto">새 글 쓰기</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4 text-center text-muted">
        <p>&copy; 2026 Spring Study Project. Built with Spring Boot & Thymeleaf</p>
    </footer>
</div>

</body>
</html>
