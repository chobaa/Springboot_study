<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>글 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4">✍️ 새 글 작성</h2>
    <hr>
    <form action="/posts/new" method="post">
        <div class="mb-3">
            <label for="title" class="form-label fw-bold">제목</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="제목을 입력하세요" required>
        </div>
        
        <div class="mb-3">
            <label for="content" class="form-label fw-bold">내용</label>
            <textarea id="content" name="content" class="form-control" rows="10" placeholder="내용을 입력하세요" required></textarea>
        </div>

        <div class="row">
            <div class="col">
                <button type="submit" class="btn btn-success w-100">등록하기</button>
            </div>
            <div class="col">
                <a href="/posts" class="btn btn-outline-secondary w-100">취소</a>
            </div>
        </div>
    </form>
</div>
</body>
</html>
