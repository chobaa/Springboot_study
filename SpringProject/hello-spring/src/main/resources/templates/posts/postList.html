<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>게시판 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row">
        <div class="col">
            <h2 class="mb-4">📋 게시판 목록</h2>
        </div>
        <div class="col text-end">
            <a href="/posts/new" class="btn btn-primary">글 작성</a>
        </div>
    </div>

    <table class="table table-hover mt-3">
        <thead class="table-dark">
        <tr>
            <th style="width: 10%">번호</th>
            <th style="width: 50%">제목</th>
            <th style="width: 40%">내용 요약</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}">
            <td th:text="${post.id}">1</td>
            <td>
                <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">게시글 제목</a>
            </td>
            <td th:text="${post.content}">게시글 내용이 출력되는 곳입니다.</td>
        </tr>
        <tr th:if="${#lists.isEmpty(posts)}">
            <td colspan="3" class="text-center text-muted">등록된 게시글이 없습니다.</td>
        </tr>
        </tbody>
    </table>
    
    <div class="mt-4">
        <a href="/" class="btn btn-secondary">홈으로 돌아가기</a>
    </div>
</div>
</body>
</html>
