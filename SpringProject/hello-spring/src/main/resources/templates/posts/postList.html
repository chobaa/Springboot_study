<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div class="container mt-5">
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <h2 class="fw-bold text-dark">📋 자유 게시판</h2>
        <div>
            <a th:if="${session.loginMember != null}" href="/posts/new" class="btn btn-primary shadow-sm">
                <i class="bi bi-pencil"></i> 새 글 쓰기
            </a>
            <span th:if="${session.loginMember == null}" class="badge bg-secondary p-2">
                🔒 글을 쓰려면 로그인이 필요합니다.
            </span>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr class="text-center">
                    <th style="width: 10%">번호</th>
                    <th style="width: 60%">제목</th>
                    <th style="width: 30%">작성자</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="post : ${posts}" class="text-center align-middle">
                    <td th:text="${post.id}" class="text-muted">1</td>
                    <td class="text-start">
                        <a th:href="@{/posts/{id}(id=${post.id})}" 
                           th:text="${post.title}" 
                           class="text-decoration-none fw-bold text-dark">제목입니다</a>
                    </td>
                    <td>
                        <span class="badge rounded-pill bg-light text-dark border" 
                              th:text="${post.authorLoginId}">user01</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(posts)}">
                    <td colspan="3" class="py-5 text-center text-muted">
                        아직 등록된 게시글이 없습니다. 첫 글의 주인공이 되어보세요!
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</body>
</html>
